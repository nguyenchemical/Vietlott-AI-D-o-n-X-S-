<!DOCTYPE html>
<html lang="vi" x-data="app()" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vietlott AI Pro - Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        html, body { height: 100%; overflow: hidden; position: fixed; width: 100%; font-family: sans-serif; }
        body { padding-top: env(safe-area-inset-top); display: flex; flex-direction: column; background: #0f172a; }
        main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Ball UI */
        .ball {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%; font-weight: 800;
            color: white; margin: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .mega-ball { background: radial-gradient(circle at 30% 30%, #ff4d4d, #b30000); }
        .power-ball { background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b); color: #000; }
        .special-ball { background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe); }

        /* Jackpot Live Card */
        .jackpot-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .text-gold {
            background: linear-gradient(to bottom, #fff5b1, #ffd700, #ff9500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .meter-bar { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .meter-fill { height: 100%; transition: width 1s ease-out; }
        
        .tab-active { background: #ef4444 !important; color: white !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="text-gray-100" x-init="startApp()">

    <header class="flex-none px-4 h-14 flex items-center justify-between border-b border-white/5 bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center font-black italic">V</div>
            <h1 class="font-black text-lg tracking-tight">VIETLOTT <span class="text-red-500">AI</span></h1>
        </div>
        <button @click="initAudio()" x-show="!audioInitialized" class="text-[10px] bg-red-600 px-3 py-1 rounded-full animate-pulse font-bold">LIVE SYNC</button>
    </header>

    <main class="no-scrollbar">
        <div class="flex overflow-x-auto p-4 gap-3 no-scrollbar">
            <template x-for="game in games" :key="game.id">
                <button @click="selectGame(game.id)" 
                    :class="activeGame === game.id ? 'tab-active border-red-500' : 'bg-slate-800 border-white/5'"
                    class="flex items-center gap-2 whitespace-nowrap px-4 py-2.5 rounded-2xl text-xs font-bold border transition-all">
                    <span class="w-2 h-2 rounded-full" :style="'background:' + game.color"></span>
                    <span x-text="game.name"></span>
                </button>
            </template>
        </div>

        <div class="px-4 mb-4">
            <div class="jackpot-card rounded-[2rem] p-6 shadow-2xl relative overflow-hidden">
                <div class="flex items-center gap-2 mb-4 opacity-80">
                    <i data-lucide="trophy" class="w-4 h-4 text-yellow-500"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Jackpot <span x-text="getCurrentGame().name"></span> Hiện Tại</span>
                </div>

                <div class="mb-2">
                    <div class="text-4xl tracking-tighter text-gold mb-1" x-text="formattedJackpot"></div>
                    <div class="text-[11px] text-white/40 font-mono" x-text="'Kỳ #' + currentKy + ' • ' + currentDayStr"></div>
                </div>

                <div class="mt-6">
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-[10px] font-bold text-white/50 uppercase">Dự báo nổ Jackpot</span>
                        <div class="flex items-center gap-2">
                            <span class="text-xl font-black text-red-500" x-text="jackpotProbability + '%'"></span>
                            <span class="animate-pulse">🚨</span>
                        </div>
                    </div>
                    <div class="meter-bar">
                        <div class="meter-fill bg-gradient-to-r from-green-500 via-yellow-500 to-red-600" :style="'width: ' + jackpotProbability + '%'"></div>
                    </div>
                </div>

                <div class="flex gap-2 mt-5">
                    <template x-for="day in ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ Nhật']">
                        <div :class="getCurrentGame().schedule.includes(day) ? 'bg-red-600/20 text-red-400 border-red-500/50' : 'bg-white/5 text-white/20 border-transparent'"
                             class="flex-1 text-[8px] py-1.5 rounded-lg border text-center font-bold" x-text="day"></div>
                    </template>
                </div>
            </div>
        </div>

        <div class="px-4">
            <div class="bg-slate-800/50 rounded-[2rem] p-6 border border-white/5 backdrop-blur-sm">
                <div class="flex justify-between items-center mb-6">
                    <div class="text-xs font-black uppercase text-white/40 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4 text-purple-500"></i> Thuật toán: <span class="text-white" x-text="getCurrentGame().name"></span>
                    </div>
                    <span class="bg-indigo-500/20 text-indigo-400 text-[9px] px-2 py-1 rounded-md font-bold uppercase tracking-tighter border border-indigo-500/30">AI Pro v3.0</span>
                </div>

                <div class="flex flex-wrap justify-center min-h-[80px] mb-8">
                    <template x-if="loading">
                        <div class="flex gap-2 items-center">
                            <div class="w-2 h-2 bg-red-500 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-red-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                            <div class="w-2 h-2 bg-red-500 rounded-full animate-bounce [animation-delay:-0.5s]"></div>
                        </div>
                    </template>
                    <template x-if="!loading && currentPrediction.length > 0">
                        <div class="flex flex-wrap justify-center animate-in zoom-in duration-300">
                            <template x-for="(num, index) in currentPrediction" :key="index">
                                <span :class="getBallClass(index)" class="ball" x-text="num"></span>
                            </template>
                        </div>
                    </template>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button @click="generatePrediction(false)" class="bg-white text-slate-900 h-14 rounded-2xl font-black uppercase text-xs active:scale-95 transition-all">Phân Tích AI</button>
                    <button @click="generatePrediction(true)" class="bg-red-600 text-white h-14 rounded-2xl font-black uppercase text-xs shadow-lg shadow-red-600/30 active:scale-95 transition-all">Soi Jackpot</button>
                </div>
            </div>
        </div>
    </main>

    <nav class="flex-none bg-slate-900/90 backdrop-blur-xl border-t border-white/5 px-8 py-4 pb-8 flex justify-between items-center z-50">
        <div class="text-red-500 flex flex-col items-center gap-1"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Trang chủ</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="history" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Lịch sử</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="bar-chart-2" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Thống kê</span></div>
        <div class="text-white/30 flex flex-col items-center gap-1"><i data-lucide="user" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase">Cá nhân</span></div>
    </nav>

    <script>
        function app() {
            return {
                darkMode: true, activeGame: 'mega645', loading: false,
                currentPrediction: [], jackpotProbability: 46,
                formattedJackpot: '27.617 Tỷ Đ', currentKy: '01486',
                currentDayStr: 'Thứ 6, 20/03/2026',
                audioCtx: null, audioInitialized: false,

                games: [
                    { id: 'mega645', name: 'Mega 6/45', color: '#ef4444', baseJackpot: 12, schedule: ['Thứ 4', 'Thứ 6', 'Chủ Nhật'], max: 45, count: 6 },
                    { id: 'power655', name: 'Power 6/55', color: '#f59e0b', baseJackpot: 30, schedule: ['Thứ 3', 'Thứ 5', 'Thứ 7'], max: 55, count: 7 },
                    { id: 'lotto535', name: 'Lotto 5/35', color: '#fbbf24', baseJackpot: 1, schedule: ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chủ Nhật'], max: 35, count: 5 },
                    { id: 'keno', name: 'Keno', color: '#3b82f6', baseJackpot: 2, schedule: ['Thứ 2','Thứ 3','Thứ 4','Thứ 5','Thứ 6','Thứ 7','Chủ Nhật'], max: 80, count: 10 }
                ],

                startApp() {
                    lucide.createIcons();
                    this.syncLiveJackpot();
                    setInterval(() => this.syncLiveJackpot(), 5000);
                },

                syncLiveJackpot() {
                    const game = this.getCurrentGame();
                    // Giả lập logic lấy dữ liệu thời gian thực
                    let randomIncrease = Math.random() * 0.5; 
                    let currentVal = game.baseJackpot + (new Date().getDate() * 0.8) + randomIncrease;
                    this.formattedJackpot = currentVal.toFixed(3) + " Tỷ Đ";
                    
                    // Logic Meter: Giải càng cao, xác suất càng tiến về vùng đỏ
                    this.jackpotProbability = Math.min(98, Math.floor((currentVal / (game.baseJackpot * 5)) * 100));
                },

                getCurrentGame() { return this.games.find(g => g.id === this.activeGame); },

                selectGame(id) {
                    this.activeGame = id;
                    this.currentPrediction = [];
                    this.syncLiveJackpot();
                    if(this.audioInitialized) this.playTone(600, 'sine', 0.05);
                },

                getBallClass(index) {
                    if (this.activeGame === 'mega645') return 'mega-ball';
                    if (this.activeGame === 'power655') return index === 6 ? 'power-ball border-2 border-red-500' : 'mega-ball';
                    return 'special-ball';
                },

                generatePrediction(isJackpot) {
                    this.initAudio();
                    this.loading = true;
                    const game = this.getCurrentGame();
                    
                    setTimeout(() => {
                        let nums = new Set();
                        while(nums.size < game.count) nums.add(Math.floor(Math.random() * game.max) + 1);
                        this.currentPrediction = Array.from(nums).sort((a,b)=>a-b).map(n => n < 10 ? '0'+n : n);
                        this.loading = false;
                        
                        if(isJackpot) {
                            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ffd700', '#ff0000'] });
                            if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
                        }
                    }, 1000);
                },

                initAudio() {
                    if (!this.audioCtx) {
                        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                        this.audioInitialized = true;
                    }
                },

                playTone(freq, type, duration) {
                    if (!this.audioCtx) return;
                    const osc = this.audioCtx.createOscillator();
                    const gain = this.audioCtx.createGain();
                    osc.type = type; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
                    osc.connect(gain); gain.connect(this.audioCtx.destination);
                    osc.start(); osc.stop(this.audioCtx.currentTime + duration);
                }
            }
        }
    </script>
</body>
</html>
